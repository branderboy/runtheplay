name: Fetch cover art

# Runs automatically on push (and can be run manually from Actions). The runner
# has open internet, so it can reach Spotify (which the dev sandbox cannot). It
# fills data/seed/artwork.json and commits it back to the branch. It only fetches
# shows still missing art, so after the first run it's a no-op (no commit loop).
on:
  workflow_dispatch:
  push:
    branches: ["main", "claude/**"]
    paths-ignore:
      - "data/seed/artwork.json" # avoid re-triggering on the bot's own commits
      - "data/seed/covers.json"
      - "public/covers/**"

permissions:
  contents: write

jobs:
  artwork:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Fetch Spotify cover art
        env:
          # Optional — the oEmbed path needs no keys. Add these repo secrets only
          # if you want the Spotify Web API fallback for shows without a URL.
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: npm run artwork

      - name: Commit artwork if changed
        run: |
          git add data/seed/artwork.json data/seed/covers.json public/covers
          if git diff --cached --quiet; then
            echo "No artwork changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Add real cover art files (automated)"
          git push
